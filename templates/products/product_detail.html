{% extends 'base.html' %}

{% block content %}

<div class="row">

    <!-- КАРТИНКА -->
    <div class="col-md-6">
        <div class="card shadow-sm p-3">
            <img src="{{ product.image.url }}" class="img-fluid rounded">
        </div>
    </div>

    <!-- ИНФА -->
    <div class="col-md-6">

        <h2 class="mb-3">{{ product.name }}</h2>

        <h3 class="text-success mb-3">{{ product.price }} $</h3>

        <p class="text-muted">
            Категория: {{ product.category.name }}
        </p>

        <hr>

        <p class="mt-3">
            {{ product.description }}
        </p>

        <div class="mt-4 d-flex gap-2">

            <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success">
                🛒 Добавить в корзину
            </a>

            <a href="{% url 'product_list' %}" class="btn btn-secondary">
                ← Назад
            </a>

        </div>

    </div>

</div>

{% endblock %}
